; ItemOutline configuration
; Location: Data/SKSE/Plugins/ItemOutline.ini
; The plugin (re)writes this file on load, filling in any missing keys.

[Filter]
; Weapons, armor, potions/food, ingredients, books, scrolls, misc/clutter,
; gold, soul gems, keys, apparatus. Loose items on the ground are covered here too.
bHighlightInventoryItems = 1

; Harvestable plants and trees (Flora / Tree).
bHighlightFlora = 1

; Mineable ore veins. OFF by default: veins are "activators" and detection is a
; keyword heuristic (editor IDs containing ore/vein/mine), so it can miss or
; over-match depending on the mods you run.
bHighlightOreVeins = 0

; Skip disabled / deleted / non-takable references.
bOnlyLootable = 1

; Skip items whose base gold value is below this (0 = no minimum).
iMinItemValue = 0

[Debug]
; Draw a fixed coloured square in the top-left corner instead of the outline.
; Use this if nothing shows up: if the square appears, the render hook and shaders
; are fine and the problem is in the geometry/camera math. If it does NOT appear,
; the hook itself isn't working.
bTestQuad = 0

; EXPERIMENTAL. Draw the outline just before the UI (hooks the Scaleform renderer)
; instead of after everything. This is what puts the outline UNDER the HUD, and may
; also make scene depth available so the outline can be occluded by walls.
; If the game crashes on load, set this back to 0 - no rebuild required.
bPreUIHook = 0

; Which vtable slot of the Scaleform renderer to hook. Slot 4 (GRenderer::BeginFrame)
; turned out never to be called, so the real layout differs from the interface.
; The log dumps the first 20 slots when bPreUIHook = 1, and prints
; "Pre-UI hook FIRED" if the chosen slot really runs every frame.
; Only probe slots whose signature is void(this) - 4, 5 and 13 - because a
; mismatched signature corrupts the stack and will crash.
iPreUIVtableIndex = 4

[Highlight]
; Inverted-hull inflation as a fraction of object size (0.03 = 3% bigger).
; Larger = thicker outline band.
fOutlineThickness = 0.03

; Hide the outline behind walls and other meshes (scene depth test).
bOcclude = 1

; Flip this if occlusion comes out backwards - i.e. the outline shows ONLY through
; walls, or disappears completely. It selects the sense of the depth buffer.
bReverseDepth = 0

; Which depth target to sample for occlusion. -1 = pick automatically.
; The log lists every depth target and whether it can be sampled, so if the
; automatic pick is wrong you can force an index here without a new build.
iDepthSource = -1

; Outline / edge color (0.0-1.0 per channel). The effect shader is built at
; runtime from these values - no ESP needed.
fColorR = 1.0
fColorG = 0.85
fColorB = 0.20

; Rim tightness: higher = thinner rim hugging the silhouette.
fEdgeFalloff = 2.5

; Edge width in alpha units (thickness of the glow band).
fEdgeWidth = 10.0

; Interior fill visibility: 0.0 = pure outline (clear interior), up to 1.0.
fFillAlpha = 0.10

; Effect-shader lifetime in seconds. -1 = infinite (removed explicitly when the
; crosshair leaves the item). Set to e.g. 0.5 to switch to auto-expiring behavior.
fShaderDuration = -1.0
