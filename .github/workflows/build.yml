name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:  # lets you run it manually from the Actions tab

jobs:
  build:
    runs-on: windows-latest

    env:
      # vcpkg is preinstalled on the GitHub Windows image; point the toolchain at it.
      VCPKG_ROOT: C:\vcpkg

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Put MSVC (cl.exe / link.exe) on PATH instead of relying on the
      # "Visual Studio" CMake generator being discoverable on the runner image.
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set up Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Configure
        run: cmake --preset windows-release

      - name: Build
        run: cmake --build build

      # Assemble a ready-to-install mod layout (MO2/Vortex or drop into Data/):
      #   SKSE/Plugins/ItemOutline.dll
      #   SKSE/Plugins/ItemOutline.ini
      #   textures/ItemOutline/edge_gradient.dds
      - name: Package mod
        shell: pwsh
        run: |
          $stage = "package/ItemOutline"
          New-Item -ItemType Directory -Force -Path "$stage/SKSE/Plugins" | Out-Null
          New-Item -ItemType Directory -Force -Path "$stage/textures/ItemOutline" | Out-Null
          $dll = Get-ChildItem -Path build -Recurse -Filter ItemOutline.dll | Select-Object -First 1
          if (-not $dll) { throw "ItemOutline.dll not found under build/" }
          Copy-Item $dll.FullName "$stage/SKSE/Plugins/"
          Copy-Item "data/SKSE/Plugins/ItemOutline.ini" "$stage/SKSE/Plugins/"
          Copy-Item "data/textures/ItemOutline/edge_gradient.dds" "$stage/textures/ItemOutline/"
          Get-ChildItem -Recurse $stage | Select-Object FullName

      - name: Upload installable mod
        uses: actions/upload-artifact@v4
        with:
          name: ItemOutline-Mod
          path: package/ItemOutline/**
          if-no-files-found: error

      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: ItemOutline-pdb
          path: build/**/ItemOutline.pdb
          if-no-files-found: warn
