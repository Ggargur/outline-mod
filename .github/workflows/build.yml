name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:  # lets you run it manually from the Actions tab

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Put MSVC (cl.exe / link.exe) on PATH instead of relying on the
      # "Visual Studio" CMake generator being discoverable on the runner image.
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set up Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Configure
        run: cmake --preset windows-release

      - name: Build
        run: cmake --build build

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: ItemOutline
          path: |
            build/**/ItemOutline.dll
            build/**/ItemOutline.pdb
          if-no-files-found: error
